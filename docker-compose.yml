# Docker Compose for local development.
# Runs the app with a persistent SQLite volume.

services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - expense-data:/app/data
    environment:
      - DB_PATH=/app/data/expenses.db
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  expense-data:
